      <stop offset="0%" stop-color="#bf9129" />
      <stop offset="100%" stop-color="#d4af37" />
    </linearGradient>
    <linearGradient id="goldGradientLight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d4af37" />
      <stop offset="100%" stop-color="#f3e5ab" />
    </linearGradient>
